%YAML 1.2
---
description: |
  Enhanced soft-off behavior. Times the hold locally on whichever half runs it
  and, when CONFIG_ZMK_SOFT_OFF_PLUS_SPLIT_SYNC is enabled, powers off both
  halves of a split keyboard together over BLE.

compatible: "zmk,behavior-soft-off-plus"

include: zero_param.yaml

properties:
  hold-time-ms:
    type: int
    default: 0
    description: |
      How long the key must be held for soft-off to trigger. By default the
      trigger happens on release once this much time has elapsed (0 = trigger on
      release regardless of hold time). With trigger-on-hold, this is instead the
      delay after which soft-off fires while the key is still held.

  trigger-on-hold:
    type: boolean
    description: |
      Two-phase, phone-style power-off. When hold-time-ms elapses while the key
      is still held, the keyboard's components are dropped for visual
      confirmation -- every device's PM suspend runs (ext-power/display, radio,
      RGB, and anything added later) and the other split half is told to DROP
      too, so both halves blank while held on a matrix key or a sideband key.
      The half whose key is held defers its real System OFF until RELEASE, so the
      wake key's GPIO is inactive when it sleeps (this avoids the nRF trap where
      "setting the system to System OFF while DETECT is high causes a wakeup from
      System OFF reset," making it safe even when this key is also the wake
      source). A half with nothing held -- the non-wired half of a sideband
      press -- has no wake key down, so it powers off as soon as it receives the
      DROP, without waiting for a release to be relayed across the link.
      Releasing before hold-time-ms cancels with nothing dropped.
...
